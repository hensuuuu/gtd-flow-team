<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTD Flow Team</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<style>
/* ── Reset & Variables ─────────────────────────────────── */
:root, [data-theme="dark"] {
  --bg:#0f1117; --surface:#1a1d27; --surface2:#242836; --surface3:#2e3345;
  --border:#363b4e; --text:#e4e6f0; --text2:#9498ab; --text3:#6b6f82;
  --accent:#4d8ef7; --accent-dim:#3a6bc5;
  --urgent:#ef4444; --high:#f59e0b; --medium:#3b82f6; --low:#6b7280; --done:#22c55e;
  --sidebar-w:260px;
  --shadow-card:0 4px 12px rgba(0,0,0,0.3);
  --shadow-chosen:0 8px 24px rgba(0,0,0,0.5);
  --overlay:rgba(0,0,0,0.5);
  --scrollbar-thumb:var(--surface3);
}
[data-theme="light"] {
  --bg:#f0f2f5; --surface:#ffffff; --surface2:#f5f6f8; --surface3:#ebedf0;
  --border:#d8dbe2; --text:#1a1d27; --text2:#5a5f72; --text3:#8b90a0;
  --accent:#3b7de9; --accent-dim:#2f65c2;
  --urgent:#dc2626; --high:#d97706; --medium:#2563eb; --low:#6b7280; --done:#16a34a;
  --shadow-card:0 2px 8px rgba(0,0,0,0.08);
  --shadow-chosen:0 6px 20px rgba(0,0,0,0.12);
  --overlay:rgba(0,0,0,0.3);
  --scrollbar-thumb:#c4c7d0;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;}
::-webkit-scrollbar{width:4px;height:6px;}
::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:2px;}
input,textarea,select,button{font-family:inherit;}

/* ── Auth Screen ───────────────────────────────────────── */
.auth-screen{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:24px;}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;width:400px;max-width:90vw;text-align:center;}
.auth-logo{width:64px;height:64px;background:linear-gradient(135deg,var(--accent),#7c3aed);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 20px;color:#fff;font-weight:700;}
.auth-card h1{font-size:24px;margin-bottom:4px;}
.auth-card p{font-size:14px;color:var(--text2);margin-bottom:24px;}
.google-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s;}
.google-btn:hover{background:var(--surface3);border-color:var(--accent);}
.google-btn svg{width:20px;height:20px;}

/* ── Setup Screen ──────────────────────────────────────── */
.setup-screen{display:none;align-items:center;justify-content:center;height:100vh;}
.setup-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;width:440px;max-width:90vw;}
.setup-card h2{font-size:20px;margin-bottom:4px;}
.setup-card p{font-size:13px;color:var(--text2);margin-bottom:20px;}
.setup-field{margin-bottom:16px;}
.setup-field label{display:block;font-size:12px;color:var(--text3);margin-bottom:6px;font-weight:500;}
.setup-field input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;outline:none;}
.setup-field input:focus{border-color:var(--accent);}
.setup-hint{font-size:11px;color:var(--text3);margin-top:4px;}

/* ── Config Panel ──────────────────────────────────────── */
.config-bar{display:none;background:rgba(245,158,11,0.1);border-bottom:1px solid rgba(245,158,11,0.3);padding:10px 24px;font-size:12px;color:var(--high);align-items:center;gap:12px;}
.config-bar input{padding:4px 8px;border-radius:4px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:11px;width:300px;}
.config-bar button{padding:4px 12px;border-radius:4px;border:none;background:var(--accent);color:#fff;font-size:11px;cursor:pointer;}

/* ── App Layout ────────────────────────────────────────── */
.app{display:none;height:100vh;}
.app.show{display:flex;}

/* ── Sidebar ───────────────────────────────────────────── */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
.sidebar-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.sidebar-logo{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),#7c3aed);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;}
.sidebar-header h1{font-size:15px;font-weight:700;flex:1;}
.sidebar-section{padding:16px 12px 8px;}
.sidebar-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;padding:0 8px 8px;}
.sb-item{display:flex;align-items:center;gap:10px;padding:7px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text2);transition:all 0.15s;border:none;background:none;width:100%;text-align:left;}
.sb-item:hover{background:var(--surface2);color:var(--text);}
.sb-item.active{background:var(--accent);color:#fff;}
.sb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sb-icon{font-size:15px;width:20px;text-align:center;}
.sb-badge{margin-left:auto;font-size:11px;background:var(--surface3);padding:2px 8px;border-radius:10px;color:var(--text3);}
.sb-item.active .sb-badge{background:rgba(255,255,255,0.2);color:#fff;}

.sidebar-members{padding:8px 12px;}
.member-row{display:flex;align-items:center;gap:10px;padding:5px 12px;border-radius:8px;font-size:12px;color:var(--text2);}
.m-avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;flex-shrink:0;background-size:cover;background-position:center;}
.m-avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover;}

.sidebar-bottom{margin-top:auto;padding:12px;border-top:1px solid var(--border);}
.user-row{display:flex;align-items:center;gap:10px;padding:8px;font-size:13px;}
.user-row .name{flex:1;}
.logout-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--text3);font-size:11px;cursor:pointer;}
.logout-btn:hover{background:var(--surface2);color:var(--text);}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--done);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.sync-row{display:flex;align-items:center;gap:8px;padding:6px 8px;font-size:11px;color:var(--done);}

/* ── Main ──────────────────────────────────────────────── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.top-bar{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;}
.top-bar h2{font-size:15px;font-weight:600;}
.top-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.search-box{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 10px;}
.search-box input{background:none;border:none;color:var(--text);outline:none;font-size:12px;width:140px;}
.search-box input::placeholder{color:var(--text3);}
.btn{padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text);transition:all 0.15s;display:flex;align-items:center;gap:6px;}
.btn:hover{background:var(--surface3);}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent-dim);}

/* Filter bar */
.filter-bar{display:flex;align-items:center;gap:6px;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--surface);flex-wrap:wrap;}
.f-chip{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:16px;font-size:11px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);cursor:pointer;transition:all 0.15s;}
.f-chip:hover{border-color:var(--accent);color:var(--text);}
.f-chip.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.f-chip .dot{width:6px;height:6px;border-radius:50%;}
.f-sep{width:1px;height:18px;background:var(--border);margin:0 2px;}

/* ── Board ─────────────────────────────────────────────── */
.board{flex:1;display:flex;gap:14px;padding:16px 20px;overflow-x:auto;overflow-y:hidden;}
.column{min-width:280px;width:280px;flex-shrink:0;display:flex;flex-direction:column;background:var(--surface);border-radius:12px;border:1px solid var(--border);overflow:hidden;}
.col-header{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--border);}
.col-color{width:4px;height:18px;border-radius:2px;}
.col-header h3{font-size:13px;font-weight:600;}
.col-count{font-size:11px;color:var(--text3);background:var(--surface2);padding:2px 8px;border-radius:10px;}
.col-wip{margin-left:auto;font-size:10px;color:var(--text3);padding:2px 6px;border-radius:4px;border:1px solid var(--border);}
.col-wip.warn{border-color:var(--high);color:var(--high);}
.col-add{margin-left:auto;width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:var(--text3);background:none;border:none;transition:all 0.15s;}
.col-add:hover{background:var(--surface2);color:var(--text);}
.col-body{flex:1;padding:6px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;min-height:60px;}

/* ── Card ──────────────────────────────────────────────── */
.card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:all 0.2s;}
.card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:var(--shadow-card);}
.card.sortable-ghost{opacity:0.4;}
.card.sortable-chosen{box-shadow:var(--shadow-chosen);}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.card-title{font-size:13px;font-weight:500;line-height:1.4;flex:1;padding-right:6px;}
.card-avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:#fff;flex-shrink:0;background-size:cover;background-position:center;overflow:hidden;}
.card-avatar img{width:100%;height:100%;object-fit:cover;}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;}
.c-tag{display:flex;align-items:center;gap:3px;padding:1px 6px;border-radius:3px;font-size:10px;background:var(--surface3);color:var(--text2);}
.c-tag .dot{width:5px;height:5px;border-radius:50%;}
.card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.prio{padding:2px 6px;border-radius:3px;font-size:10px;font-weight:600;}
.prio-urgent{background:rgba(239,68,68,0.15);color:var(--urgent);}
.prio-high{background:rgba(245,158,11,0.15);color:var(--high);}
.prio-medium{background:rgba(59,130,246,0.15);color:var(--medium);}
.prio-low{background:rgba(107,114,128,0.15);color:var(--low);}
.card-due{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:3px;}
.card-due.overdue{color:var(--urgent);}

/* ── Add Card ──────────────────────────────────────────── */
.add-form{display:none;background:var(--surface2);border:1px dashed var(--border);border-radius:8px;padding:10px;}
.add-form.show{display:block;}
.add-input{width:100%;background:none;border:none;color:var(--text);font-size:13px;outline:none;}
.add-input::placeholder{color:var(--text3);}
.add-actions{display:flex;gap:6px;margin-top:8px;}
.add-actions .btn{font-size:11px;padding:4px 10px;}

/* ── Panel ─────────────────────────────────────────────── */
.panel-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--overlay);z-index:50;}
.panel-overlay.open{display:flex;justify-content:flex-end;}
.detail-panel{width:520px;max-width:100vw;height:100vh;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;animation:slideIn 0.25s ease;}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.panel-head{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border);}
.panel-close{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--text3);background:none;border:none;}
.panel-close:hover{background:var(--surface2);color:var(--text);}
.panel-status{padding:3px 10px;border-radius:6px;font-size:11px;}
.panel-body{flex:1;overflow-y:auto;padding:18px;}
.panel-title{font-size:18px;font-weight:600;margin-bottom:14px;outline:none;border:1px solid transparent;border-radius:6px;padding:4px 8px;margin:-4px -8px 14px;}
.panel-title:hover{border-color:var(--border);}
.panel-field{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--surface3);}
.panel-label{width:72px;flex-shrink:0;font-size:12px;color:var(--text3);padding-top:2px;}
.panel-val{font-size:13px;color:var(--text);flex:1;line-height:1.5;}
.panel-desc{margin-top:14px;padding:14px;background:var(--surface2);border-radius:8px;font-size:13px;line-height:1.7;color:var(--text2);min-height:60px;outline:none;}
.panel-desc:empty::before{content:'설명을 입력하세요...';color:var(--text3);}
.p-tag{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:5px;font-size:11px;background:var(--surface2);border:1px solid var(--border);}
.p-tag .dot{width:5px;height:5px;border-radius:50%;}

/* ── Modal ─────────────────────────────────────────────── */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--overlay);z-index:60;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;width:400px;max-width:90vw;}
.modal h3{font-size:16px;margin-bottom:12px;}
.modal-field{margin-bottom:12px;}
.modal-field label{display:block;font-size:12px;color:var(--text3);margin-bottom:4px;}
.modal-field input,.modal-field select,.modal-field textarea{width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;outline:none;}
.modal-field input:focus,.modal-field select:focus,.modal-field textarea:focus{border-color:var(--accent);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}

/* ── Invite ────────────────────────────────────────────── */
.invite-section{padding:8px 12px;}
.invite-btn{width:100%;padding:6px;border-radius:8px;border:1px dashed var(--border);background:none;color:var(--text3);font-size:12px;cursor:pointer;transition:all 0.15s;}
.invite-btn:hover{border-color:var(--accent);color:var(--accent);}

/* ── Empty state ───────────────────────────────────────── */
.empty-col{text-align:center;padding:20px;color:var(--text3);font-size:12px;}

/* ── Theme Toggle ─────────────────────────────────────── */
.theme-toggle{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:16px;transition:all 0.2s;position:relative;overflow:hidden;}
.theme-toggle:hover{background:var(--surface3);color:var(--text);border-color:var(--accent);}
.theme-toggle .icon-sun,.theme-toggle .icon-moon{position:absolute;transition:transform 0.3s ease, opacity 0.3s ease;}
[data-theme="light"] .theme-toggle .icon-moon{transform:rotate(-90deg);opacity:0;}
[data-theme="light"] .theme-toggle .icon-sun{transform:rotate(0);opacity:1;}
[data-theme="dark"] .theme-toggle .icon-sun{transform:rotate(90deg);opacity:0;}
[data-theme="dark"] .theme-toggle .icon-moon{transform:rotate(0);opacity:1;}

/* ── Responsive ────────────────────────────────────────── */
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);z-index:30;transition:transform 0.3s;}
  .sidebar.open{transform:translateX(0);}
  .column{min-width:260px;width:260px;}
}
</style>
</head>
<body>

<!-- ═══ Auth Screen ═══ -->
<div class="auth-screen" id="authScreen">
  <button class="theme-toggle" onclick="toggleTheme()" title="다크/라이트 모드 전환" style="position:absolute;top:20px;right:20px;">
    <span class="icon-sun">☀️</span>
    <span class="icon-moon">🌙</span>
  </button>
  <div class="auth-card">
    <div class="auth-logo">GT</div>
    <h1>GTD Flow Team</h1>
    <p>팀 프로젝트를 칸반 보드로 관리하세요</p>
    <button class="google-btn" onclick="signInWithGoogle()">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google로 시작하기
    </button>
    <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border);">
      <p style="font-size:11px;color:var(--text3);margin-bottom:8px;">Supabase 미설정 시 로컬 데모로 체험 가능</p>
      <button class="btn" style="width:100%;justify-content:center;" onclick="startLocalDemo()">🎯 로컬 데모 체험하기</button>
    </div>
  </div>
</div>

<!-- ═══ Org Setup ═══ -->
<div class="setup-screen" id="setupScreen">
  <div class="setup-card">
    <!-- Tab Switch -->
    <div style="display:flex;gap:0;margin-bottom:20px;border:1px solid var(--border);border-radius:10px;overflow:hidden;">
      <button class="setup-tab active" id="tabCreate" onclick="switchSetupTab('create')" style="flex:1;padding:10px;border:none;cursor:pointer;font-size:13px;font-weight:600;background:var(--accent);color:#fff;transition:all 0.2s;">새로 만들기</button>
      <button class="setup-tab" id="tabJoin" onclick="switchSetupTab('join')" style="flex:1;padding:10px;border:none;cursor:pointer;font-size:13px;font-weight:500;background:var(--surface2);color:var(--text2);transition:all 0.2s;">기존 워크스페이스 참여</button>
    </div>

    <!-- Create Panel -->
    <div id="panelCreate">
      <h2>워크스페이스 만들기</h2>
      <p>팀의 첫 번째 워크스페이스를 설정하세요</p>
      <div class="setup-field">
        <label>워크스페이스 이름</label>
        <input type="text" id="orgName" placeholder="예: FastClass 팀">
      </div>
      <div class="setup-field">
        <label>URL 슬러그</label>
        <input type="text" id="orgSlug" placeholder="예: fastclass">
        <div class="setup-hint">team.gtdflow.com/<strong id="slugPreview">slug</strong></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:20px;">
        <button class="btn btn-primary" style="flex:1;justify-content:center;" onclick="createOrg()">워크스페이스 생성</button>
      </div>
    </div>

    <!-- Join Panel -->
    <div id="panelJoin" style="display:none;">
      <h2>워크스페이스 참여</h2>
      <p>참여할 워크스페이스를 검색하세요</p>
      <div class="setup-field">
        <label>워크스페이스 이름 또는 코드</label>
        <input type="text" id="joinQuery" placeholder="이름 또는 슬러그로 검색..." oninput="searchOrgs()">
      </div>

<script>
// ═══════════════════════════════════════════════════════════
// GTD Flow Team - MVP App
// ═══════════════════════════════════════════════════════════

// ── Theme ────────────────────────────────────────────────
(function initTheme() {
  const saved = localStorage.getItem('gtd-team-theme');
  const prefer = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  const theme = saved || prefer;
  document.documentElement.setAttribute('data-theme', theme);
})();

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('gtd-team-theme', next);
}

// ── State ─────────────────────────────────────────────────
let sb = null; // supabase client
let currentUser = null;
let currentOrg = null;
let isLocalMode = false;

let STATE = {
  columns: [],
  tasks: [],
  projects: [],
  members: [],
  taskProjects: [], // {task_id, project_id}
};

let filter = 'all'; // 'all', 'mine', project_id
let searchQuery = '';
let selectedTaskId = null;
let selectedColor = '#4d8ef7';

const COLORS = ['#4d8ef7','#8b5cf6','#06b6d4','#f59e0b','#ec4899','#22c55e','#ef4444','#6366f1'];
const PRIO_LABELS = {urgent:'URGENT',high:'HIGH',medium:'MED',low:'LOW'};

// ── Config ────────────────────────────────────────────────
const SUPABASE_URL = 'https://xrziytxplswunfytqvde.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhyeml5dHhwbHN3dW5meXRxdmRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMzQyNDIsImV4cCI6MjA5MTYxMDI0Mn0.zgDw_G37H2n5zix1rmqrbCpH3p8aMi7XuIWc6qCYawo';

// ── Init ──────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  initSupabase(SUPABASE_URL, SUPABASE_KEY);
});

function initSupabase(url, key) {
  sb = supabase.createClient(url, key);
  sb.auth.onAuthStateChange((event, session) => {
    if (session?.user) {
      currentUser = session.user;
      loadApp();
    } else {
      showAuth();
    }
  });
}

function connectSupabase() {
  const url = document.getElementById('cfgUrl').value.trim();
  const key = document.getElementById('cfgKey').value.trim();
  if (!url || !key) return alert('URL과 Key를 입력하세요');
  localStorage.setItem('gtd-team-supabase', JSON.stringify({url, key}));
  initSupabase(url, key);
  document.getElementById('configBar').style.display = 'none';
}

// ── Auth ──────────────────────────────────────────────────
function showAuth() {
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('app').classList.remove('show');
}

async function signInWithGoogle() {
  if (!sb) return startLocalDemo();
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + window.location.pathname }
  });
  if (error) alert('로그인 실패: ' + error.message);
}

async function signOut() {
  if (sb) await sb.auth.signOut();
  if (isLocalMode) {
    isLocalMode = false;
    currentUser = null;
    currentOrg = null;
    showAuth();
  }
}

// ── Local Demo ────────────────────────────────────────────
function startLocalDemo() {
  isLocalMode = true;
  currentUser = {
    id: 'local-user-1',
    user_metadata: { full_name: '데모 사용자', avatar_url: null, email: 'demo@gtdflow.com' },
    email: 'demo@gtdflow.com'
  };

  // Load from localStorage or create defaults
  const saved = localStorage.getItem('gtd-team-local');
  if (saved) {
    try {
      const d = JSON.parse(saved);
      STATE = d.state;
      currentOrg = d.org;
      showMainApp();
      return;
    } catch(e) {}
  }

  // Show org setup
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('setupScreen').style.display = 'flex';
}

function switchSetupTab(tab) {
  const tabCreate = document.getElementById('tabCreate');
  const tabJoin = document.getElementById('tabJoin');
  const panelCreate = document.getElementById('panelCreate');
  const panelJoin = document.getElementById('panelJoin');
  if (tab === 'create') {
    tabCreate.style.background = 'var(--accent)'; tabCreate.style.color = '#fff'; tabCreate.style.fontWeight = '600';
    tabJoin.style.background = 'var(--surface2)'; tabJoin.style.color = 'var(--text2)'; tabJoin.style.fontWeight = '500';
    panelCreate.style.display = 'block'; panelJoin.style.display = 'none';
  } else {
    tabJoin.style.background = 'var(--accent)'; tabJoin.style.color = '#fff'; tabJoin.style.fontWeight = '600';
    tabCreate.style.background = 'var(--surface2)'; tabCreate.style.color = 'var(--text2)'; tabCreate.style.fontWeight = '500';
    panelJoin.style.display = 'block'; panelCreate.style.display = 'none';
  }
}

let searchTimer = null;
async function searchOrgs() {
  const q = document.getElementById('joinQuery').value.trim();
  const container = document.getElementById('orgSearchResults');

  if (!q) { container.innerHTML = ''; return; }
  if (isLocalMode) {
    container.innerHTML = '<div style="font-size:12px;color:var(--text3);padding:8px;">로컬 데모에서는 검색이 지원되지 않습니다.</div>';
    return;
  }

  clearTimeout(searchTimer);
  searchTimer = setTimeout(async () => {
    const { data: orgs } = await sb.from('organizations').select('*').or(`name.ilike.%${q}%,slug.ilike.%${q}%`);

    if (!orgs || orgs.length === 0) {
      container.innerHTML = '<div style="font-size:12px;color:var(--text3);padding:8px;">검색 결과가 없습니다.</div>';
      return;
    }

    container.innerHTML = orgs.map(o => `
      <div onclick="joinOrg('${o.id}')" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;transition:all 0.15s;" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">
        <div style="width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#7c3aed);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0;">${o.name[0]}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:13px;font-weight:600;">${o.name}</div>
          <div style="font-size:11px;color:var(--text3);">${o.slug}</div>
        </div>
        <div style="font-size:11px;color:var(--accent);font-weight:500;">참여 →</div>
      </div>
    `).join('');
  }, 300);
}

async function joinOrg(orgId) {
  if (!sb || isLocalMode) return;

  const meta = currentUser.user_metadata || {};
  const { error: joinErr } = await sb.from('org_members').insert({
    org_id: orgId,
    user_id: currentUser.id,
    role: 'member',
    display_name: meta.full_name || currentUser.email?.split('@')[0] || '멤버',
    avatar_url: meta.avatar_url || null,
  });

  if (joinErr) {
    if (joinErr.code === '23505') alert('이미 이 워크스페이스에 참여하고 있습니다.');
    else alert('참여 실패: ' + joinErr.message);
    return;
  }

  const { data: org } = await sb.from('organizations').select('*').eq('id', orgId).single();
  currentOrg = org;
  await loadOrgData();
  showMainApp();
  subscribeRealtime();
}

async function createOrg() {
  const name = document.getElementById('orgName').value.trim();
  const slug = document.getElementById('orgSlug').value.trim();
  if (!name) return alert('이름을 입력하세요');

  const orgSlug = slug || name.toLowerCase().replace(/\s/g,'-');

  if (!isLocalMode && sb) {
    // Supabase mode — insert org (auto-trigger creates columns + owner member)
    const { data, error } = await sb.from('organizations').insert({
      name, slug: orgSlug, owner_id: currentUser.id,
    }).select().single();
    if (error) return alert('생성 실패: ' + error.message);

    // Update member display_name & avatar
    const meta = currentUser.user_metadata || {};
    await sb.from('org_members').update({
      display_name: meta.full_name || currentUser.email?.split('@')[0] || '나',
      avatar_url: meta.avatar_url || null,
    }).eq('org_id', data.id).eq('user_id', currentUser.id);

    currentOrg = data;
    await loadOrgData();
    showMainApp();
    subscribeRealtime();
    return;
  }

  // Local demo mode
  currentOrg = { id: 'org-' + Date.now(), name, slug: orgSlug, owner_id: currentUser.id };

  STATE.columns = [
    { id: 'col-1', org_id: currentOrg.id, name: 'Backlog',     color: '#6b7280', sort_order: 0, is_done_column: false },
    { id: 'col-2', org_id: currentOrg.id, name: 'To Do',       color: '#3b82f6', sort_order: 1, is_done_column: false },
    { id: 'col-3', org_id: currentOrg.id, name: 'In Progress', color: '#f59e0b', sort_order: 2, is_done_column: false },
    { id: 'col-4', org_id: currentOrg.id, name: 'In Review',   color: '#a855f7', sort_order: 3, is_done_column: false },
    { id: 'col-5', org_id: currentOrg.id, name: 'Done',        color: '#22c55e', sort_order: 4, is_done_column: true },
  ];

  STATE.members = [{
    id: 'm-1', org_id: currentOrg.id, user_id: currentUser.id,
    role: 'owner', display_name: currentUser.user_metadata?.full_name || '나',
    avatar_url: currentUser.user_metadata?.avatar_url
  }];

  STATE.tasks = [];
  STATE.projects = [];
  STATE.taskProjects = [];

  saveLocal();
  showMainApp();
}

function saveLocal() {
  if (isLocalMode) {
    localStorage.setItem('gtd-team-local', JSON.stringify({ state: STATE, org: currentOrg }));
  }
}

// ── Load App ──────────────────────────────────────────────
async function loadApp() {
  if (isLocalMode) { showMainApp(); return; }

  // 1) Check if user already has an org membership
  const { data: memberships } = await sb.from('org_members').select('*, organizations(*)').eq('user_id', currentUser.id);

  if (memberships && memberships.length > 0) {
    currentOrg = memberships[0].organizations;
    await loadOrgData();
    showMainApp();
    subscribeRealtime();
    return;
  }

  // 2) Check if user was invited by email (pending invitation)
  const userEmail = currentUser.email;
  if (userEmail) {
    const { data: invites } = await sb.from('org_members').select('*, organizations(*)').eq('invited_email', userEmail).is('user_id', null);

    if (invites && invites.length > 0) {
      // Claim the invitation — link user_id and update profile
      const invite = invites[0];
      const meta = currentUser.user_metadata || {};
      await sb.from('org_members').update({
        user_id: currentUser.id,
        display_name: meta.full_name || invite.display_name || userEmail.split('@')[0],
        avatar_url: meta.avatar_url || null,
      }).eq('id', invite.id);

      currentOrg = invite.organizations;
      await loadOrgData();
      showMainApp();
      subscribeRealtime();
      return;
    }
  }

  // 3) No membership, no invitation → show setup/join screen
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('setupScreen').style.display = 'flex';
}

async function loadOrgData() {
  if (isLocalMode || !sb) return;
  const oid = currentOrg.id;

  const [colRes, taskRes, projRes, memRes, tpRes] = await Promise.all([
    sb.from('board_columns').select('*').eq('org_id', oid).order('sort_order'),
    sb.from('tasks').select('*').eq('org_id', oid).eq('is_archived', false).order('sort_order'),
    sb.from('projects').select('*').eq('org_id', oid).order('sort_order'),
    sb.from('org_members').select('*').eq('org_id', oid),
    sb.from('task_projects').select('*'),
  ]);

  STATE.columns = colRes.data || [];
  STATE.tasks = taskRes.data || [];
  STATE.projects = projRes.data || [];
  STATE.members = memRes.data || [];
  STATE.taskProjects = tpRes.data || [];
}

function subscribeRealtime() {
  if (!sb || isLocalMode) return;
  sb.channel('team-board')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'tasks' }, () => loadOrgData().then(renderAll))
    .on('postgres_changes', { event: '*', schema: 'public', table: 'task_projects' }, () => loadOrgData().then(renderAll))
    .on('postgres_changes', { event: '*', schema: 'public', table: 'task_comments' }, () => {})
    .on('postgres_changes', { event: '*', schema: 'public', table: 'org_members' }, () => loadOrgData().then(renderAll))
    .subscribe();
}

// ── Show Main ─────────────────────────────────────────────
function showMainApp() {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('app').classList.add('show');
  document.getElementById('orgTitle').textContent = currentOrg?.name || 'GTD Flow Team';

  // User info
  const meta = currentUser.user_metadata || {};
  document.getElementById('userName').textContent = meta.full_name || currentUser.email || '사용자';
  const avatarEl = document.getElementById('userAvatar');
  if (meta.avatar_url) {
    avatarEl.innerHTML = `<img src="${meta.avatar_url}" alt="">`;
  } else {
    avatarEl.textContent = (meta.full_name || 'U')[0];
  }

  if (isLocalMode) {
    document.getElementById('syncStatus').innerHTML = '<div class="sync-dot" style="background:var(--high)"></div> 로컬 모드';
  }

  renderAll();
}

// ── Render All ────────────────────────────────────────────
function renderAll() {
  renderFilterBar();
  renderSidebar();
  renderBoard();
}

function renderFilterBar() {
  const bar = document.getElementById('filterBar');
  const projChips = STATE.projects.map(p =>
    `<div class="f-chip ${filter===p.id?'active':''}" onclick="setFilter('${p.id}',this)">
      <span class="dot" style="background:${p.color}"></span> ${p.name}
    </div>`
  ).join('');

  bar.innerHTML = `
    <div class="f-chip ${filter==='all'?'active':''}" onclick="setFilter('all',this)">전체</div>
    <div class="f-chip ${filter==='mine'?'active':''}" onclick="setFilter('mine',this)">🙋 내 태스크</div>
    ${projChips ? '<div class="f-sep"></div>' + projChips : ''}
  `;
}

function renderSidebar() {
  // Projects
  const pl = document.getElementById('projectList');
  pl.innerHTML = STATE.projects.map(p => {
    const count = STATE.taskProjects.filter(tp => tp.project_id === p.id).length;
    return `<button class="sb-item ${filter===p.id?'active':''}" onclick="setFilter('${p.id}',this)">
      <span class="sb-dot" style="background:${p.color}"></span> ${p.name}
      <span class="sb-badge">${count}</span>
    </button>`;
  }).join('');

  // Members
  const ml = document.getElementById('memberList');
  document.getElementById('memberTitle').textContent = `팀원 (${STATE.members.length}명)`;
  ml.innerHTML = STATE.members.map(m => {
    const name = m.display_name || m.invited_email || '멤버';
    const initial = name[0];
    const colors = ['#4d8ef7','#8b5cf6','#06b6d4','#f59e0b','#ec4899','#22c55e'];
    const c = colors[name.charCodeAt(0) % colors.length];
    return `<div class="member-row">
      <div class="m-avatar" style="background:${c}">${m.avatar_url ? `<img src="${m.avatar_url}">` : initial}</div>
      <span>${name}${m.user_id === currentUser.id ? ' (나)' : ''}</span>
      <span style="margin-left:auto;font-size:10px;color:var(--text3)">${m.role}</span>
    </div>`;
  }).join('');

  // Total count
  document.getElementById('totalCount').textContent = STATE.tasks.length;
}

// ── Board ─────────────────────────────────────────────────
function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  searchQuery = document.getElementById('searchInput')?.value?.toLowerCase() || '';

  STATE.columns.sort((a,b) => a.sort_order - b.sort_order).forEach(col => {
    let tasks = getFilteredTasks(col.id);
    const el = document.createElement('div');
    el.className = 'column';
    el.dataset.colId = col.id;

    el.innerHTML = `
      <div class="col-header">
        <div class="col-color" style="background:${col.color}"></div>
        <h3>${col.name}</h3>
        <span class="col-count">${tasks.length}</span>
        ${col.wip_limit ? `<span class="col-wip ${tasks.length>=col.wip_limit?'warn':''}">WIP ${tasks.length}/${col.wip_limit}</span>` : ''}
        <button class="col-add" onclick="showAddTaskModal('${col.id}')">+</button>
      </div>
      <div class="col-body" id="colbody-${col.id}">
        ${tasks.map(renderCardHTML).join('')}
        ${tasks.length===0?'<div class="empty-col">태스크 없음</div>':''}
      </div>
    `;
    board.appendChild(el);

    // SortableJS
    const body = el.querySelector('.col-body');
    new Sortable(body, {
      group: 'kanban',
      animation: 150,
      ghostClass: 'sortable-ghost',
      chosenClass: 'sortable-chosen',
      onEnd: (evt) => {
        const taskId = evt.item.dataset.taskId;
        const newColId = evt.to.id.replace('colbody-','');
        moveTask(taskId, newColId, evt.newIndex);
      }
    });
  });
}

function getFilteredTasks(colId) {
  return STATE.tasks.filter(t => {
    if (t.column_id !== colId) return false;
    if (searchQuery && !t.title.toLowerCase().includes(searchQuery)) return false;
    if (filter === 'mine' && t.assignee_id !== currentUser.id) return false;
    if (filter !== 'all' && filter !== 'mine') {
      const linked = STATE.taskProjects.some(tp => tp.task_id === t.id && tp.project_id === filter);
      if (!linked) return false;
    }
    return true;
  }).sort((a,b) => (a.sort_order||0) - (b.sort_order||0));
}

function renderCardHTML(t) {
  const member = STATE.members.find(m => m.user_id === t.assignee_id);
  const projTags = STATE.taskProjects
    .filter(tp => tp.task_id === t.id)
    .map(tp => STATE.projects.find(p => p.id === tp.project_id))
    .filter(Boolean)
    .map(p => `<div class="c-tag"><span class="dot" style="background:${p.color}"></span>${p.name}</div>`)
    .join('');

  const name = member?.display_name || '';
  const initial = name ? name[0] : '';
  const colors = ['#4d8ef7','#8b5cf6','#06b6d4','#f59e0b','#ec4899','#22c55e'];
  const avatarColor = name ? colors[name.charCodeAt(0) % colors.length] : '#666';

  const isOverdue = t.due_date && new Date(t.due_date) < new Date();
  const dueStr = t.due_date ? formatDate(t.due_date) : '';

  return `
    <div class="card" data-task-id="${t.id}" onclick="openPanel('${t.id}')">
      <div class="card-top">
        <div class="card-title">${t.title}</div>
        ${member ? `<div class="card-avatar" style="background:${avatarColor}" title="${name}">${member.avatar_url ? `<img src="${member.avatar_url}">` : initial}</div>` : ''}
      </div>
      ${projTags ? `<div class="card-tags">${projTags}</div>` : ''}
      <div class="card-meta">
        <span class="prio prio-${t.priority}">${PRIO_LABELS[t.priority]}</span>
        ${dueStr ? `<span class="card-due ${isOverdue?'overdue':''}">📅 ${dueStr}</span>` : ''}
      </div>
    </div>
  `;
}

// ── Task Actions ──────────────────────────────────────────
function showAddTaskModal(colId) {
  const select = document.getElementById('newTaskCol');
  select.innerHTML = STATE.columns.map(c => `<option value="${c.id}" ${c.id===colId?'selected':''}>${c.name}</option>`).join('');

  const assignSelect = document.getElementById('newTaskAssignee');
  assignSelect.innerHTML = '<option value="">미지정</option>' +
    STATE.members.map(m => `<option value="${m.user_id}">${m.display_name || '멤버'}</option>`).join('');

  document.getElementById('newTaskTitle').value = '';
  document.getElementById('newTaskDue').value = '';
  document.getElementById('taskModal').classList.add('open');
  setTimeout(() => document.getElementById('newTaskTitle').focus(), 100);
}

async function addTask() {
  const title = document.getElementById('newTaskTitle').value.trim();
  if (!title) return;
  const colId = document.getElementById('newTaskCol').value;
  const priority = document.getElementById('newTaskPrio').value;
  const assignee = document.getElementById('newTaskAssignee').value || null;
  const due = document.getElementById('newTaskDue').value || null;

  const task = {
    id: isLocalMode ? 'task-' + Date.now() : undefined,
    org_id: currentOrg.id,
    title,
    description: '',
    column_id: colId,
    assignee_id: assignee,
    creator_id: currentUser.id,
    priority,
    due_date: due,
    sort_order: STATE.tasks.filter(t => t.column_id === colId).length,
    is_archived: false,
    created_at: new Date().toISOString(),
    updated_at: new Date().toISOString(),
  };

  if (isLocalMode) {
    STATE.tasks.push(task);
    saveLocal();
  } else {
    const { data, error } = await sb.from('tasks').insert(task).select().single();
    if (error) return alert('추가 실패: ' + error.message);
    STATE.tasks.push(data);
  }

  document.getElementById('taskModal').classList.remove('open');
  renderAll();
}

async function moveTask(taskId, newColId, newIndex) {
  const task = STATE.tasks.find(t => t.id === taskId);
  if (!task) return;
  task.column_id = newColId;
  task.sort_order = newIndex;

  // Check done column
  const col = STATE.columns.find(c => c.id === newColId);
  if (col?.is_done_column) task.completed_at = new Date().toISOString();
  else task.completed_at = null;

  if (isLocalMode) {
    saveLocal();
  } else {
    await sb.from('tasks').update({
      column_id: newColId,
      sort_order: newIndex,
      completed_at: task.completed_at
    }).eq('id', taskId);
  }
  renderAll();
}

async function deleteTask() {
  if (!selectedTaskId) return;
  if (!confirm('이 태스크를 삭제하시겠습니까?')) return;

  if (isLocalMode) {
    STATE.tasks = STATE.tasks.filter(t => t.id !== selectedTaskId);
    STATE.taskProjects = STATE.taskProjects.filter(tp => tp.task_id !== selectedTaskId);
    saveLocal();
  } else {
    await sb.from('tasks').delete().eq('id', selectedTaskId);
    STATE.tasks = STATE.tasks.filter(t => t.id !== selectedTaskId);
    STATE.taskProjects = STATE.taskProjects.filter(tp => tp.task_id !== selectedTaskId);
  }

  closePanel();
  renderAll();
}

// ── Panel ─────────────────────────────────────────────────
function openPanel(taskId) {
  selectedTaskId = taskId;
  const t = STATE.tasks.find(x => x.id === taskId);
  if (!t) return;

  const col = STATE.columns.find(c => c.id === t.column_id);
  const member = STATE.members.find(m => m.user_id === t.assignee_id);
  const projTags = STATE.taskProjects
    .filter(tp => tp.task_id === t.id)
    .map(tp => STATE.projects.find(p => p.id === tp.project_id))
    .filter(Boolean);

  const statusColors = {
    '#6b7280':'background:rgba(107,114,128,0.15);color:#6b7280',
    '#3b82f6':'background:rgba(59,130,246,0.15);color:#3b82f6',
    '#f59e0b':'background:rgba(245,158,11,0.15);color:#f59e0b',
    '#a855f7':'background:rgba(168,85,247,0.15);color:#a855f7',
    '#22c55e':'background:rgba(34,197,94,0.15);color:#22c55e',
  };

  const ps = document.getElementById('panelColName');
  ps.textContent = col?.name || '';
  ps.style.cssText = statusColors[col?.color] || '';

  const name = member?.display_name || '미지정';
  const initial = name[0] || '?';
  const colors = ['#4d8ef7','#8b5cf6','#06b6d4','#f59e0b','#ec4899','#22c55e'];
  const ac = colors[name.charCodeAt(0) % colors.length];

  const projTagsHtml = projTags.map(p =>
    `<div class="p-tag"><span class="dot" style="background:${p.color}"></span> ${p.name}</div>`
  ).join('') || '<span style="color:var(--text3)">없음</span>';

  // Build project select for linking
  const unlinked = STATE.projects.filter(p => !projTags.find(pp => pp.id === p.id));
  const linkSelect = unlinked.length > 0
    ? `<select onchange="linkProject('${t.id}',this.value)" style="padding:3px 6px;border-radius:4px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:11px;margin-left:4px;">
         <option value="">+ 추가</option>
         ${unlinked.map(p => `<option value="${p.id}">${p.name}</option>`).join('')}
       </select>` : '';

  // Assignee select
  const assigneeSelect = `<select onchange="updateAssignee('${t.id}',this.value)" style="padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:12px;">
    <option value="">미지정</option>
    ${STATE.members.map(m => `<option value="${m.user_id}" ${t.assignee_id===m.user_id?'selected':''}>${m.display_name||'멤버'}</option>`).join('')}
  </select>`;

  // Column select
  const colSelect = `<select onchange="updateColumn('${t.id}',this.value)" style="padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:12px;">
    ${STATE.columns.map(c => `<option value="${c.id}" ${t.column_id===c.id?'selected':''}>${c.name}</option>`).join('')}
  </select>`;

  document.getElementById('panelBody').innerHTML = `
    <div class="panel-title" contenteditable="true" onblur="updateTitle('${t.id}',this.textContent)">${t.title}</div>
    <div class="panel-field">
      <div class="panel-label">상태</div>
      <div class="panel-val">${colSelect}</div>
    </div>
    <div class="panel-field">
      <div class="panel-label">담당자</div>
      <div class="panel-val">${assigneeSelect}</div>
    </div>
    <div class="panel-field">
      <div class="panel-label">프로젝트</div>
      <div class="panel-val" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">${projTagsHtml}${linkSelect}</div>
    </div>
    <div class="panel-field">
      <div class="panel-label">우선순위</div>
      <div class="panel-val"><span class="prio prio-${t.priority}">${PRIO_LABELS[t.priority]}</span></div>
    </div>
    <div class="panel-field">
      <div class="panel-label">마감일</div>
      <div class="panel-val">
        <input type="date" value="${t.due_date||''}" onchange="updateDue('${t.id}',this.value)"
          style="padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:12px;">
      </div>
    </div>
    <div class="panel-desc" contenteditable="true" onblur="updateDesc('${t.id}',this.innerHTML)">${t.description||''}</div>
    <div style="margin-top:16px;font-size:11px;color:var(--text3)">
      생성: ${formatDateTime(t.created_at)}
      ${t.completed_at ? ' · 완료: ' + formatDateTime(t.completed_at) : ''}
    </div>
  `;
  document.getElementById('panelOverlay').classList.add('open');
}

function closePanel(e) {
  if (!e || e.target === document.getElementById('panelOverlay')) {
    document.getElementById('panelOverlay').classList.remove('open');
    selectedTaskId = null;
  }
}

// ── Inline Updates ────────────────────────────────────────
async function updateTitle(id, title) {
  const t = STATE.tasks.find(x => x.id === id);
  if (!t || !title.trim()) return;
  t.title = title.trim();
  if (!isLocalMode && sb) await sb.from('tasks').update({title: t.title}).eq('id', id);
  saveLocal(); renderBoard();
}

async function updateDesc(id, desc) {
  const t = STATE.tasks.find(x => x.id === id);
  if (!t) return;
  t.description = desc;
  if (!isLocalMode && sb) await sb.from('tasks').update({description: desc}).eq('id', id);
  saveLocal();
}

async function updateAssignee(id, userId) {
  const t = STATE.tasks.find(x => x.id === id);
  if (!t) return;
  t.assignee_id = userId || null;
  if (!isLocalMode && sb) await sb.from('tasks').update({assignee_id: t.assignee_id}).eq('id', id);
  saveLocal(); renderAll();
}

async function updateColumn(id, colId) {
  const t = STATE.tasks.find(x => x.id === id);
  if (!t) return;
  t.column_id = colId;
  const col = STATE.columns.find(c => c.id === colId);
  t.completed_at = col?.is_done_column ? new Date().toISOString() : null;
  if (!isLocalMode && sb) await sb.from('tasks').update({column_id: colId, completed_at: t.completed_at}).eq('id', id);
  saveLocal(); renderAll();
}

async function updateDue(id, date) {
  const t = STATE.tasks.find(x => x.id === id);
  if (!t) return;
  t.due_date = date || null;
  if (!isLocalMode && sb) await sb.from('tasks').update({due_date: t.due_date}).eq('id', id);
  saveLocal(); renderAll();
}

async function linkProject(taskId, projId) {
  if (!projId) return;
  const link = { task_id: taskId, project_id: projId };
  STATE.taskProjects.push(link);
  if (!isLocalMode && sb) await sb.from('task_projects').insert(link);
  saveLocal(); renderAll(); openPanel(taskId);
}

// ── Project ───────────────────────────────────────────────
function showProjectModal() {
  document.getElementById('newProjName').value = '';
  selectedColor = '#4d8ef7';
  const picker = document.getElementById('colorPicker');
  picker.innerHTML = COLORS.map(c =>
    `<div onclick="selectColor('${c}',this)" style="width:28px;height:28px;border-radius:50%;background:${c};cursor:pointer;border:2px solid ${c==='#4d8ef7'?'#fff':'transparent'};transition:all 0.15s"></div>`
  ).join('');
  document.getElementById('projectModal').classList.add('open');
  setTimeout(() => document.getElementById('newProjName').focus(), 100);
}

function selectColor(c, el) {
  selectedColor = c;
  el.parentElement.querySelectorAll('div').forEach(d => d.style.borderColor = 'transparent');
  el.style.borderColor = '#fff';
}

async function addProject() {
  const name = document.getElementById('newProjName').value.trim();
  if (!name) return;
  const proj = {
    id: isLocalMode ? 'proj-' + Date.now() : undefined,
    org_id: currentOrg.id, name, color: selectedColor,
    status: 'active', sort_order: STATE.projects.length,
  };

  if (isLocalMode) {
    STATE.projects.push(proj);
    saveLocal();
  } else {
    const { data, error } = await sb.from('projects').insert(proj).select().single();
    if (error) return alert('추가 실패: ' + error.message);
    STATE.projects.push(data);
  }

  document.getElementById('projectModal').classList.remove('open');
  renderAll();
}

// ── Members ───────────────────────────────────────────────
function showInviteModal() {
  document.getElementById('inviteEmail').value = '';
  document.getElementById('inviteModal').classList.add('open');
  setTimeout(() => document.getElementById('inviteEmail').focus(), 100);
}

async function inviteMember() {
  const email = document.getElementById('inviteEmail').value.trim();
  const role = document.getElementById('inviteRole').value;
  if (!email) return;

  const member = {
    id: isLocalMode ? 'mem-' + Date.now() : undefined,
    org_id: currentOrg.id, user_id: null,
    invited_email: email, role,
    display_name: email.split('@')[0],
  };

  if (isLocalMode) {
    member.user_id = 'user-' + Date.now();
    STATE.members.push(member);
    saveLocal();
  } else {
    const { data, error } = await sb.from('org_members').insert(member).select().single();
    if (error) return alert('초대 실패: ' + error.message);
    STATE.members.push(data);
  }

  document.getElementById('inviteModal').classList.remove('open');
  renderAll();
}

// ── Filter ────────────────────────────────────────────────
function setFilter(f, el) {
  filter = f;
  renderAll();
}

// ── Helpers ───────────────────────────────────────────────
function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  return `${dt.getMonth()+1}/${dt.getDate()}`;
}

function formatDateTime(d) {
  if (!d) return '';
  const dt = new Date(d);
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
}

// Slug preview
document.getElementById('orgSlug')?.addEventListener('input', (e) => {
  document.getElementById('slugPreview').textContent = e.target.value || 'slug';
});
</script>
